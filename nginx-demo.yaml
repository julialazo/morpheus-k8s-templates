apiVersion: apps/v1
kind: Deployment
metadata:
  name: customera-portal
spec:
  replicas: 3
  selector:
    matchLabels:
      app: customera-portal
  template:
    metadata:
      labels:
        app: customera-portal
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          command:
            - /bin/sh
            - -c
            - |
              cat > /usr/share/nginx/html/index.html <<EOF
              <!DOCTYPE html>
              <html>
              <head>
                <title>Customer A Portal</title>
              </head>
              <body>
                <h1>Customer A Application</h1>
                <p>Running on SPTel Edge Cloud CaaS</p>
                <p>Deployment Model: Shared Kubernetes Cluster</p>
                <p>Provisioned via HPE Morpheus Kubernetes Service (HKS)</p>
                <p>Status: Running</p>
              </body>
              </html>
              EOF

              nginx -g 'daemon off;'

---
apiVersion: v1
kind: Service
metadata:
  name: customera-portal-service
spec:
  type: NodePort
  selector:
    app: customera-portal
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30088
